spring.application.name=hcl
server.port=${PORT:8080}

# Copy these into Render -> Environment variables.
# Quick demo deployment (uses in-memory H2; data resets when service restarts):
# PORT=8080
# DB_URL=jdbc:h2:mem:springbeans;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
# DB_USERNAME=sa
# DB_PASSWORD=
# JPA_DDL_AUTO=update
# CORS_ALLOWED_ORIGIN_PATTERNS=https://spring-beans.vercel.app,http://localhost:5173,http://localhost:3000
# JWT_SECRET=change-this-secret-key-for-hcl-hackathon-minimum-32-characters
# JWT_EXPIRATION_MS=3600000
# MAIL_HOST=smtp.gmail.com
# MAIL_PORT=587
# MAIL_USERNAME=
# MAIL_PASSWORD=
# MAIL_FROM=no-reply@springbeans.local
# MAIL_SMTP_AUTH=true
# MAIL_SMTP_STARTTLS=true
#
# Persistent database deployment:
# Replace DB_URL, DB_USERNAME, and DB_PASSWORD with the values from your database provider.
# For MySQL example:
# DB_URL=jdbc:mysql://YOUR_HOST:3306/YOUR_DATABASE?useSSL=true&allowPublicKeyRetrieval=true&serverTimezone=UTC
# DB_USERNAME=YOUR_DATABASE_USER
# DB_PASSWORD=YOUR_DATABASE_PASSWORD
#
# Frontend environment variable:
# VITE_API_URL=https://YOUR_BACKEND_NAME.onrender.com/api

spring.datasource.url=${DB_URL:jdbc:h2:mem:springbeans;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.sql.init.mode=never
spring.h2.console.enabled=true
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:5173,http://localhost:3000}

app.jwt.secret=${JWT_SECRET:change-this-secret-key-for-hcl-hackathon-minimum-32-characters}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

# Configure these values to send real email notifications.
# Example Gmail setup: use an app password, not your normal account password.
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
app.mail.from=${MAIL_FROM:no-reply@springbeans.local}
